name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive release version
        id: version
        run: |
          python - <<'PY'
          import os
          import re
          import sys

          semver_pattern = r"v((0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*))"
          ref = os.environ["GITHUB_REF_NAME"]
          match = re.fullmatch(semver_pattern, ref)
          if not match:
              print(
                  "release tag must look like vMAJOR.MINOR.PATCH, "
                  f"got {ref!r}"
              )
              sys.exit(1)
          version = match.group(1)
          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as output:
              output.write(f"version={version}\n")
          print(f"Release version: {version}")
          PY

      - name: Verify changelog entry
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: grep -F "## ${VERSION} -" CHANGELOG.md

      - name: Verify release tag is on main and highest SemVer tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import re
          import subprocess
          import sys

          version = os.environ["VERSION"]
          version_tuple = tuple(int(part) for part in version.split("."))

          branches = subprocess.check_output(
              ["git", "branch", "-r", "--contains", "HEAD"], text=True
          ).splitlines()
          if not any(branch.strip() == "origin/main" for branch in branches):
              print(
                  "release tag must point to a commit contained in "
                  "origin/main"
              )
              sys.exit(1)

          tags = subprocess.check_output(
              ["git", "tag", "--list", "v*"], text=True
          ).splitlines()
          semver_pattern = r"v((0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*))"
          semver_tags = []
          for tag in tags:
              match = re.fullmatch(semver_pattern, tag)
              if match:
                  parsed = tuple(
                      int(part) for part in match.group(1).split(".")
                  )
                  semver_tags.append((parsed, tag))

          higher = [
              tag for parsed, tag in semver_tags if parsed > version_tuple
          ]
          if higher:
              print(
                  f"release tag v{version} is not the highest SemVer tag; "
                  f"higher tags: {higher}"
              )
              sys.exit(1)
          PY

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check lockfile
        run: uv lock --locked

      - name: Run tests
        run: uv run pytest -q

      - name: Run Ruff lint
        run: uv run --with ruff ruff check .

      - name: Check Ruff formatting
        run: uv run --with ruff ruff format --check .

      - name: Run Pyright
        run: uv run --with pyright pyright agh tests

      - name: Check Dockerfile
        run: docker build --check .

      - name: Test Docker runtime hardening
        run: >
          AGH_STRICT_DOCKER_RUNTIME=1
          uv run pytest tests/test_docker_runtime.py -q

  build-windows:
    name: Build Windows (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: windows-2022
            python-architecture: x64
          - arch: arm64
            runner: windows-11-arm
            python-architecture: arm64
    env:
      VERSION: ${{ needs.validate.outputs.version }}
      ARCH: ${{ matrix.arch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: ${{ matrix.python-architecture }}

      - name: Check lockfile
        run: uv lock --locked

      - name: Build frozen CLI
        shell: pwsh
        run: |
          $env:SETUPTOOLS_SCM_PRETEND_VERSION_FOR_AGH = $env:VERSION
          uv run --locked --group release pyinstaller `
            --clean `
            --noconfirm `
            --onefile `
            --name agh `
            --copy-metadata agh `
            agh/cli/main.py

      - name: Validate frozen CLI version
        shell: pwsh
        run: |
          $actual = (& .\dist\agh.exe --version).Trim()
          if ($actual -ne "agh $env:VERSION") {
            throw "Expected frozen version 'agh $env:VERSION', got '$actual'"
          }

      - name: Create deterministic zip
        shell: pwsh
        run: |
          $asset = "agh-$env:VERSION-windows-$env:ARCH.zip"
          New-Item -ItemType Directory -Force -Path release-root | Out-Null
          Copy-Item .\dist\agh.exe .\release-root\agh.exe
          Push-Location release-root
          Compress-Archive -Path agh.exe -DestinationPath "..\$asset" -Force
          Pop-Location
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Move-Item $asset "release\$asset"

      - name: Validate zip layout
        shell: pwsh
        run: |
          $asset = "release\agh-$env:VERSION-windows-$env:ARCH.zip"
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead($asset)
          try {
            $entries = @($zip.Entries | ForEach-Object { $_.FullName })
            if ($entries -notcontains "agh.exe") {
              throw "Archive is missing root agh.exe"
            }
          } finally {
            $zip.Dispose()
          }

      - name: Upload Windows asset
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-asset
          path: release/agh-${{ env.VERSION }}-windows-${{ matrix.arch }}.zip
          if-no-files-found: error

  publish-pypi:
    name: Publish PyPI
    runs-on: ubuntu-latest
    needs:
      - validate
      - build-windows
    environment: pypi

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: uv build

      - name: Verify built package version
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          python - <<'PY'
          import glob
          import os
          import sys

          version = os.environ["VERSION"]
          wheels = glob.glob(f"dist/agh-{version}-*.whl")
          sdists = glob.glob(f"dist/agh-{version}.tar.gz")
          if len(wheels) != 1 or len(sdists) != 1:
              print("built artifacts do not match release version")
              print("wheels:", wheels)
              print("sdists:", sdists)
              sys.exit(1)
          print("Built artifacts:", wheels[0], sdists[0])
          PY

      - name: Install built CLI
        run: uv tool install --force dist/*.whl

      - name: Check installed CLI
        run: agh --help

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-ghcr:
    name: Publish GHCR
    runs-on: ubuntu-latest
    needs:
      - validate
      - build-windows
    environment: ghcr

    env:
      IMAGE_NAME: ghcr.io/giulianotesta7/agent-guidance-hub

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Re-verify release tag before publishing latest
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import re
          import subprocess
          import sys

          version = os.environ["VERSION"]
          version_tuple = tuple(int(part) for part in version.split("."))

          branches = subprocess.check_output(
              ["git", "branch", "-r", "--contains", "HEAD"], text=True
          ).splitlines()
          if not any(branch.strip() == "origin/main" for branch in branches):
              print(
                  "release tag must point to a commit contained in "
                  "origin/main"
              )
              sys.exit(1)

          tags = subprocess.check_output(
              ["git", "tag", "--list", "v*"], text=True
          ).splitlines()
          semver_pattern = r"v((0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*))"
          semver_tags = []
          for tag in tags:
              match = re.fullmatch(semver_pattern, tag)
              if match:
                  parsed = tuple(
                      int(part) for part in match.group(1).split(".")
                  )
                  semver_tags.append((parsed, tag))

          higher = [
              tag for parsed, tag in semver_tags if parsed > version_tuple
          ]
          if higher:
              print(
                  f"release tag v{version} is not the highest SemVer tag; "
                  f"higher tags: {higher}"
              )
              sys.exit(1)
          PY

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            AGH_VERSION=${{ needs.validate.outputs.version }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.validate.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - validate
      - build-windows
      - publish-pypi
      - publish-ghcr
    env:
      VERSION: ${{ needs.validate.outputs.version }}

    steps:
      - name: Download Windows assets
        uses: actions/download-artifact@v4
        with:
          pattern: windows-*-asset
          path: windows-assets
          merge-multiple: true

      - name: Verify Windows release assets
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          test -f "windows-assets/agh-${VERSION}-windows-amd64.zip"
          test -f "windows-assets/agh-${VERSION}-windows-arm64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            windows-assets/agh-${{ env.VERSION }}-windows-amd64.zip
            windows-assets/agh-${{ env.VERSION }}-windows-arm64.zip

  update-homebrew:
    name: Update Homebrew tap
    runs-on: macos-latest
    permissions:
      contents: read
    needs:
      - validate
      - publish-pypi
      - publish-ghcr
      - github-release

    steps:
      - name: Tap Homebrew repository
        id: tap
        run: |
          brew tap giulianotesta7/homebrew-tap
          tap_dir=$(brew --repository giulianotesta7/homebrew-tap)
          echo "dir=${tap_dir}" >> "$GITHUB_OUTPUT"

      - name: Update formula from PyPI
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          TAP_DIR: ${{ steps.tap.outputs.dir }}
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          import re
          import urllib.request
          from pathlib import Path

          version = os.environ["VERSION"]
          formula_path = Path(os.environ["TAP_DIR"]) / "Formula/agh.rb"
          data_url = "https://pypi.org/pypi/agh/json"

          with urllib.request.urlopen(data_url, timeout=30) as response:
              payload = json.load(response)

          release_files = payload["releases"].get(version, [])
          sdist = next(
              (
                  item for item in release_files
                  if item.get("packagetype") == "sdist"
              ),
              None,
          )
          if sdist is None:
              raise SystemExit(f"No sdist found on PyPI for agh {version}")

          url = sdist["url"]
          with urllib.request.urlopen(url, timeout=30) as response:
              sha256 = hashlib.sha256(response.read()).hexdigest()

          text = formula_path.read_text(encoding="utf-8")
          url_pattern = (
              r'url "https://files\.pythonhosted\.org/[^"]+'
              r'/agh-[^"]+\.tar\.gz"'
          )
          text, url_replacements = re.subn(
              url_pattern,
              f'url "{url}"',
              text,
              count=1,
          )
          text, sha_replacements = re.subn(
              r'sha256 "[0-9a-f]{64}"',
              f'sha256 "{sha256}"',
              text,
              count=1,
          )
          if url_replacements != 1 or sha_replacements != 1:
              raise SystemExit(
                  "Expected to replace exactly one formula URL and sha256; "
                  f"got url={url_replacements}, sha256={sha_replacements}"
              )
          formula_path.write_text(text, encoding="utf-8")

          print(f"Updated agh formula to {version}")
          print(f"sdist: {url}")
          print(f"sha256: {sha256}")
          PY

      - name: Audit formula
        run: brew audit --strict --online giulianotesta7/tap/agh

      - name: Create Homebrew tap pull request
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAP_DIR: ${{ steps.tap.outputs.dir }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail

          cd "$TAP_DIR"

          if git diff --quiet -- Formula/agh.rb; then
            echo "Formula/agh.rb is already up to date."
            exit 0
          fi

          branch="agh-${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add Formula/agh.rb
          git commit -m "agh ${VERSION}"
          tap_remote="https://x-access-token:${HOMEBREW_TAP_TOKEN}"
          tap_remote="${tap_remote}@github.com/giulianotesta7/homebrew-tap.git"
          git push --force-with-lease "$tap_remote" "$branch"

          source_url="https://github.com/giulianotesta7/AgentGuidanceHub"
          source_url="${source_url}/releases/tag/v${VERSION}"
          pypi_url="https://pypi.org/project/agh/${VERSION}/"
          body=$(cat <<EOF
          Updates \`agh\` to \`${VERSION}\`.

          Source release: ${source_url}
          PyPI package: ${pypi_url}
          EOF
          )
          if gh pr view "$branch" \
            --repo giulianotesta7/homebrew-tap >/dev/null 2>&1; then
            gh pr edit "$branch" \
              --repo giulianotesta7/homebrew-tap \
              --title "agh ${VERSION}" \
              --body "$body"
          else
            gh pr create \
              --repo giulianotesta7/homebrew-tap \
              --head "$branch" \
              --base main \
              --title "agh ${VERSION}" \
              --body "$body"
          fi
